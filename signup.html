<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta — OSKI Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <span class="eyebrow">OSKI STORE</span>
    <h1>Crear cuenta</h1>
    <p class="muted">Usa el correo que Oscar haya asignado a tu tienda.</p>
    <form id="signupForm" class="stack-form">
      <label>Email<input id="email" type="email" required placeholder="tu@email.com"></label>
      <label>Contraseña<input id="password" type="password" minlength="6" required placeholder="mínimo 6 caracteres"></label>
      <button class="btn primary" type="submit">Crear cuenta</button>
    </form>
    <p id="signupStatus" class="status"></p>
    <a class="text-link" href="admin.html">Ya tengo cuenta</a>
  </main>
  <script src="cloud-config.js"></script>
  <script type="module" src="signup.js"></script>
</body>
</html>
