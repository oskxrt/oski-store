<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — OSKI Store</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin-page">
  <section id="loginView" class="auth-page">
    <main class="auth-card">
      <span class="eyebrow">OSKI STORE</span>
      <h1>Entrar</h1>
      <p class="muted">Super admin o usuario de tienda.</p>
      <form id="loginForm" class="stack-form">
        <label>Email<input id="loginEmail" type="email" required placeholder="correo"></label>
        <label>Contraseña<input id="loginPassword" type="password" required placeholder="contraseña"></label>
        <button class="btn primary" type="submit">Entrar</button>
      </form>
      <p id="loginStatus" class="status"></p>
      <a class="text-link" href="signup.html">Crear cuenta</a>
    </main>
  </section>

  <section id="appView" class="admin-shell hidden">
    <aside class="admin-sidebar">
      <div class="side-brand">
        <div class="side-logo" id="sideLogo">O</div>
        <div class="side-brand-text">
          <strong id="sideTitle">OSKI Store</strong>
          <small id="sideSubtitle">Panel</small>
        </div>
        <button id="adminMenuToggle" class="admin-menu-toggle" type="button" aria-expanded="false">Menú</button>
      </div>
      <nav class="side-nav">
        <button data-view="dashboard" class="active">Resumen</button>
        <button data-view="products">Productos</button>
        <button data-view="customers">Clientes</button>
        <button data-view="orders">Pedidos</button>
        <button data-view="settings">Tienda / Tema</button>
        <button id="superNavBtn" data-view="super" class="hidden">Super Admin</button>
        <a id="openCatalogLink" href="#" target="_blank" rel="noopener">Ver catálogo</a>
        <button id="logoutBtn">Salir</button>
      </nav>
      <div class="side-note" id="currentUserBox"></div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <span class="eyebrow" id="viewEyebrow">ADMIN</span>
          <h1 id="viewTitle">Resumen</h1>
          <p class="muted" id="viewDescription">Control de tienda.</p>
        </div>
        <div class="top-actions">
          <select id="storeSwitcher" class="store-switcher"></select>
          <button id="refreshBtn" class="btn ghost" type="button">Actualizar</button>
        </div>
      </header>

      <section id="dashboardView" class="view-section"></section>
      <section id="productsView" class="view-section hidden"></section>
      <section id="customersView" class="view-section hidden"></section>
      <section id="ordersView" class="view-section hidden"></section>
      <section id="settingsView" class="view-section hidden"></section>
      <section id="superView" class="view-section hidden"></section>
    </main>
  </section>

  <dialog id="modal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">Modal</h3>
        <button id="modalClose" class="icon-btn" type="button">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </dialog>

  <script src="/cloud-config.js"></script>
  <script type="module" src="/admin.js"></script>
</body>
</html>
